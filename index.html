<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Studio Stingless — makers of Merge Maestro, a bite-sized roguelike merge-builder."
    />

    <title>Studio Stingless</title>

    <link rel="icon" href="assets/img/studio-icon.png" type="image/png" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="top-bar">
      <div class="top-bar-inner">
        <div class="top-bar-left">
          <span class="studio-name">Studio Stingless</span>
        </div>
        <div class="top-bar-right" aria-label="Studio social links">
          <a
            class="icon-btn"
            href="https://x.com/studiostingless"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Studio Stingless on X"
            title="X"
          >
            <img
              src="assets/icons/x.svg"
              alt=""
              class="icon-img"
              aria-hidden="true"
            />
          </a>
          <a
            class="icon-btn"
            href="https://bsky.app/profile/studiostingless.bsky.social"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Studio Stingless on Bluesky"
            title="Bluesky"
          >
            <img
              src="assets/icons/bluesky.svg"
              alt=""
              class="icon-img"
              aria-hidden="true"
            />
          </a>
          <a
            class="icon-btn"
            href="https://discord.gg/NYqJr5ZFdt"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Studio Stingless Discord"
            title="Discord"
          >
            <img
              src="assets/icons/discord.svg"
              alt=""
              class="icon-img"
              aria-hidden="true"
            />
          </a>
          <a
            class="icon-btn icon-btn-email"
            href="mailto:stingless.dev@gmail.com"
            aria-label="Email Studio Stingless"
            title="Email stingless.dev@gmail.com"
          >
            <img
              src="assets/icons/email.svg"
              alt=""
              class="icon-img"
              aria-hidden="true"
            />
          </a>
        </div>
      </div>
    </header>

    <main id="main" class="hero-page">
      <section class="hero-video-wrap">
        <video
          class="hero-video"
          src="assets/vid/mergemaestro-clip.mp4"
          autoplay
          muted
          loop
          playsinline
          aria-hidden="true"
        ></video>
        <div class="hero-overlay">
          <div class="hero-title-row">
            <img
              src="assets/img/icon.png"
              alt="Merge Maestro icon"
              class="hero-logo"
            />
            <p class="hero-tagline">Merge Maestro</p>
          </div>
          <h1 class="hero-heading">
            A bite-sized roguelike merge‑builder where you combine 100's of
            Tokens and Powers to create endless synergies.
          </h1>
          <div class="platform-row" aria-label="Platforms">
            <a
              class="platform-btn platform-steam"
              href="https://store.steampowered.com/app/3519530/Merge_Maestro/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Merge Maestro on Steam"
            >
              <span class="platform-icon">
                <img
                  src="assets/icons/steam.svg"
                  alt=""
                  class="icon-img"
                  aria-hidden="true"
                />
              </span>
              <span class="platform-label">Steam</span>
            </a>
            <a
              class="platform-btn platform-android"
              href="https://play.google.com/store/apps/details?id=co.meanmanta.mergemaestro"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Merge Maestro on Android"
            >
              <span class="platform-icon">
                <img
                  src="assets/icons/android.svg"
                  alt=""
                  class="icon-img"
                  aria-hidden="true"
                />
              </span>
              <span class="platform-label">Android</span>
            </a>
            <a
              class="platform-btn platform-ios"
              href="https://apps.apple.com/us/app/merge-maestro/id6670491302?platform=iphone"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Merge Maestro on iOS"
            >
              <span class="platform-icon">
                <img
                  src="assets/icons/ios.svg"
                  alt=""
                  class="icon-img"
                  aria-hidden="true"
                />
              </span>
              <span class="platform-label">iOS</span>
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
